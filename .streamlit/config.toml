[client]
showErrorDetails = false
toolbarMode = "minimal"

[logger]
level = "warning"

[theme]
primaryColor = "#0066cc"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
maxUploadSize = 100
enableXsrfProtection = true
allowRunOnSave = true
headless = true

[runner]
magicEnabled = true
